<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DS Curriculum (Redesigned)</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f172a;
  --card: #111827;
  --soft: #1f2937;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --accent: #6366f1;
  --accent-2: #22c55e;
  --border: #1f2937;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: var(--text);
}

.page {
  max-width: 1100px;
  margin: auto;
  padding: 2rem 1rem;
}

.header h1 {
  font-size: 22px;
  font-weight: 600;
}

.header p {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
}

.search {
  margin: 1rem 0;
}

.search input {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--soft);
  color: var(--text);
  outline: none;
}

.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}

.btn {
  padding: 6px 14px;
  border-radius: 999px;
  background: var(--soft);
  border: 1px solid var(--border);
  font-size: 12px;
  cursor: pointer;
}

.btn.active {
  background: var(--accent);
}

.category {
  margin-top: 1.5rem;
}

.cat-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.cat-header h2 {
  font-size: 12px;
  text-transform: uppercase;
  color: var(--muted);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}

.card {
  background: linear-gradient(145deg, #0b1220, #111827);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  transition: 0.2s;
  position: relative;
}

.card:hover {
  transform: translateY(-3px) scale(1.01);
  border-color: var(--accent);
}

.title {
  font-size: 13px;
  font-weight: 500;
}

.tags {
  margin-top: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 999px;
  background: #1e293b;
}

.note {
  margin-top: 6px;
  font-size: 11px;
  color: var(--muted);
}

.badge {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 999px;
  background: var(--accent-2);
}

.summary {
  margin-top: 2rem;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.metric {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}

.metric .num {
  font-size: 22px;
}

.metric .lbl {
  font-size: 11px;
  color: var(--muted);
}

@media (max-width: 600px) {
  .summary {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <h1>Data Structures Curriculum</h1>
    <p>Clean, modern overview — actually enjoyable to look at</p>
  </div>

  <div class="search">
    <input placeholder="Search..." />
  </div>

  <div class="controls">
    <div class="btn active">All</div>
    <div class="btn">Interview</div>
    <div class="btn">CP</div>
    <div class="btn">Systems</div>
  </div>

  <div class="category">
    <div class="cat-header">
      <h2>Linear Structures</h2>
      <span>6</span>
    </div>

    <div class="grid">
      <div class="card">
        <div class="title">Array</div>
        <div class="tags">
          <span class="tag">interview</span>
        </div>
      </div>

      <div class="card">
        <div class="title">Stack</div>
        <div class="tags">
          <span class="tag">critical</span>
        </div>
      </div>

      <div class="card">
        <div class="title">Queue</div>
      </div>

      <div class="card">
        <div class="title">Monotonic Stack</div>
        <div class="badge">NEW</div>
        <div class="note">Used in next greater element</div>
      </div>
    </div>
  </div>

  <div class="summary">
    <div class="metric">
      <div class="num">72</div>
      <div class="lbl">Total</div>
    </div>

    <div class="metric">
      <div class="num">18</div>
      <div class="lbl">New</div>
    </div>

    <div class="metric">
      <div class="num">30</div>
      <div class="lbl">Interview</div>
    </div>

    <div class="metric">
      <div class="num">22</div>
      <div class="lbl">CP</div>
    </div>
  </div>

</div>

</body>
</html>
